<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Allura&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Allura&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/confirm.css" />
    <title>Confirm</title>
  </head>
  <body class="body-container">
    <header class="header-container">
      <img
        class="header__logo-image"
        src="assets/Logo_excimer.png"
        alt="logo"
      />
      <a class="header__phone-link" href="tel:+74951536015"
        >+7 (495) 153-60-15</a
      >
    </header>
    <main class="main-container">
      <div class="main-wrapper">
        <h1 class="main-content__header">Подтверждение визита</h1>
        <div class="main-content__visit-info">
          <p class="visit-info-header">Информация о записи</p>
          <div class="visit-info-container">
            <div class="visit-content-date-container">
              <div class="visit-content-date">
                <p class="visit-date-header visit-content-header">Дата</p>
                <p class="visit-date visit-content-text">10 августа 2026</p>
              </div>
              <div class="visit-content-time">
                <p class="visit-time-header visit-content-header">Время</p>
                <p class="visit-time visit-content-text">15:00</p>
              </div>
            </div>
            <div class="visit-content-info-container">
              <div class="visit-content-doctor">
                <p class="visit-doctor-header visit-content-header">Врач</p>
                <p class="visit-doctor visit-content-text">
                  Парджанадзе Георгий Павлович
                </p>
              </div>
              <div class="visit-content-address">
                <p class="visit-address-header visit-content-header">
                  Адрес клиники
                </p>
                <div class="visit-address visit-content-text">
                  <p class="visit-address-city">Ростов-на-Дону</p>
                  <div class="visit-address-divider"></div>
                  ул. Максима Горького, д. 106/93
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="buttons-group">
          <div class="buttons-visit">
            <button class="button-confirm">Подтверждаю</button>
            <button class="button-cancel">Отменить</button>
          </div>
          <div class="button-wrapper">
            <p class="button-wrapper-container-text">У меня остались вопросы</p>
            <button class="action-button">Свяжитесь со мной</button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
